<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>What's Your Body Shape? — The Eysè Edit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Manrope', system-ui, sans-serif;
    background: #fff;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  @keyframes resultIn {
    from { transform: translateY(16px); }
    to   { transform: translateY(0); }
  }

  @keyframes qIn {
    from { transform: translateY(8px); }
    to   { transform: translateY(0); }
  }

  .quiz-option:hover {
    border-color: #c96442 !important;
    background: #fff !important;
    transform: translateX(3px);
  }

  .product-card:hover {
    border-color: #c96442 !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }

  /* Quiz card grid — 5 across, then wraps down on smaller screens */
  @media (max-width: 900px) {
    .shape-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .footer-props { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 560px) {
    .shape-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .nav-links { display: none !important; }
    .product-row { grid-template-columns: 1fr !important; }
  }

  /* Result panel — two columns collapse to one */
  @media (max-width: 760px) {
    .result-cols { grid-template-columns: 1fr !important; }
  }
</style>
<link id="gfont-Poppins" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap">
</head>
<body style="background-color: rgb(255, 255, 255)">
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="shapes.js"></script>

<script type="text/babel" src="question-quiz.jsx"></script>
<script type="text/babel" src="blog-quiz.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
